<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Order summary card</title>

  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: hsl(225, 100%, 94%);
    }
    .order-summary-card {
        width: 320px;
        background: white;
        border-radius: 12px;
        overflow: hidden;
    }
    .order-hero-img {
        width: 100%;
    }
    .order-summary-content {
        padding: 25px 25px;
    }
    .order-title {
        font-size: 24px;
        color: hsl(223, 47%, 23%);
        text-align: center;
        margin-bottom: 15px;
    }
    .order-description {
        font-size: 16px;
        color: hsl(224, 23%, 55%);
        text-align: center;
        line-height: 30px;
    }
    .annual-plan {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 20px 0;
    }
    .order-btns {
        display: flex;
        flex-direction: column;
    }
    .order-btns a {
        width: 100%;
        text-align: center;
        text-decoration: none;
    }
    .order-btns a:nth-child(1) {
        color: white;
        background: hsl(245, 75%, 52%);
    }
    .order-btns a:nth-child(2) {
        color: hsl(223, 47%, 23%);
    }
  </style>
</head>
<body>
    <main>
        <section class="container">
            <div class="order-summary-card">
                <img class="order-hero-img" src="./images/illustration-hero.svg" alt="">
                <div class="order-summary-content">
                    <h1 class="order-title">Order Summary</h1>
                    <p class="order-description">
                        You can now listen to millions of songs, audiobooks, and podcasts on any 
                        device anywhere you like!
                    </p>
                    <div class="annual-plan">
                        <img src="./images/icon-music.svg" alt="">
                        <div class="annual-price">
                            <p>Annual Plan</p>
                            <p>$59.99/year</p>
                        </div>
                        <a href="#">Change</a>
                    </div>
                    <div class="order-btns">
                        <a class="btn-payment" href="#">Proceed to Payment</a>
                        <a class="btn-cancel" href="#">Cancel Order</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
