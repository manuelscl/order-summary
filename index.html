<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700;900&display=swap" rel="stylesheet">

  <title>Order summary card</title>

  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Red Hat Display', sans-serif;
    }
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: hsl(225, 100%, 94%);
        background-image: url('./images/pattern-background-mobile.svg');
        background-repeat: repeat-x;
    }
    .order-summary-card {
        max-width: 340px;
        background: white;
        border-radius: 14px;
        overflow: hidden;
    }
    .order-hero-img {
        width: 100%;
    }
    .order-summary-content {
        padding: 25px 25px;
    }
    .order-title {
        font-size: 22px;
        font-weight: 900;
        color: hsl(223, 47%, 23%);
        text-align: center;
        margin-bottom: 15px;
    }
    .order-description {
        font-size: 16px;
        color: hsl(224, 23%, 55%);
        text-align: center;
        line-height: 30px;
    }
    .annual-plan {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        background: hsl(225, 100%, 98%);
        border-radius: 10px;
        padding: 18px;
        margin: 24px 0;
    }
    .annual-price p {
        font-size: 15px;
    }
    .annual-price p:nth-child(1) {
        font-weight: 900;
        color: hsl(223, 47%, 23%);
        margin-bottom: 4px;
    }
    .annual-price p:nth-child(2) {
        color: hsl(224, 23%, 55%);
    }
    .annual-plan a {
        font-size: 14px;
        font-weight: 900;
        color: hsl(245, 75%, 52%);
        margin-left: 15px;
        transition: 0.3s ease;
    }
    .annual-plan a:hover {
        color: #766CF1;
        text-decoration: none;
    }
    .order-btns {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .order-btns a {
        width: 100%;
        font-size: 15px;
        font-weight: 700;
        padding: 14px;
        text-align: center;
        text-decoration: none;
        border-radius: 10px;
        transition: 0.3s ease;
    }
    .order-btns a:nth-child(1) {
        color: white;
        background: hsl(245, 75%, 52%);
        box-shadow: 0 10px 10px 6px hsla(245, 75%, 52%, 0.150);
    }
    .order-btns a:hover:nth-child(1) {
        background: #766CF1;
        box-shadow: 0 10px 12px 8px hsla(245, 75%, 52%, 0.160);
    }
    .order-btns a:nth-child(2) {
        color: hsl(224, 23%, 55%);
    }
    .order-btns a:hover:nth-child(2) {
        color: hsl(223, 47%, 23%);
    }

    @media (min-width: 700px) {
        body {
            background-image: url('./images/pattern-background-desktop.svg');
            background-repeat: no-repeat;
            background-position: top;
        }
        .order-summary-card {
            max-width: 400px;
        }
        .order-summary-content {
            padding: 35px 35px 20px;
        }
        .order-description {
            font-size: 15px;
            line-height: 24px;
        }
        .annual-plan {
            justify-content: space-evenly;
            gap: 25px;
        }
        .annual-plan a {
            margin-left: 35px;
        }
    }
  </style>
</head>
<body>
    <main>
        <section class="container">
            <div class="order-summary-card">
                <img class="order-hero-img" src="./images/illustration-hero.svg" alt="flat illustration">
                <div class="order-summary-content">
                    <h1 class="order-title">Order Summary</h1>
                    <p class="order-description">
                        You can now listen to millions of songs, audiobooks, and podcasts on any 
                        device anywhere you like!
                    </p>
                    <div class="annual-plan">
                        <img src="./images/icon-music.svg" alt="">
                        <div class="annual-price">
                            <p>Annual Plan</p>
                            <p>$59.99/year</p>
                        </div>
                        <a href="#">Change</a>
                    </div>
                    <div class="order-btns">
                        <a class="btn-payment" href="#">Proceed to Payment</a>
                        <a class="btn-cancel" href="#">Cancel Order</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

</html>
